<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPS Rappi — Riders</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0d0d0c;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#f0ede8;min-height:100vh;padding:2rem;}
  .dash{max-width:1100px;margin:0 auto;}

  /* topbar */
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem;}
  .topbar-left h1{font-size:20px;font-weight:500;color:#f0ede8;}
  .topbar-left p{font-size:12px;color:#666;margin-top:4px;}
  .topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  select{background:#1a1a18;border:0.5px solid #333;color:#ccc;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;outline:none;}
  select:hover{border-color:#555;}
  .refresh-btn{background:#1a1a18;border:0.5px solid #333;color:#ccc;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;}
  .refresh-btn:hover{border-color:#555;color:#fff;}

  /* loading */
  .loading{display:flex;align-items:center;justify-content:center;height:300px;color:#555;font-size:14px;gap:10px;}
  .spinner{width:18px;height:18px;border:2px solid #333;border-top-color:#FF6840;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* metrics */
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
  .metric{background:#1a1a18;border:0.5px solid #252523;border-radius:10px;padding:1rem 1.25rem;}
  .metric-label{font-size:11px;color:#666;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .metric-value{font-size:30px;font-weight:500;color:#f0ede8;line-height:1;}
  .metric-delta{font-size:11px;margin-top:6px;}
  .up{color:#5DCAA5;}
  .down{color:#F09595;}
  .neutral{color:#888;}

  /* charts row */
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .card{background:#1a1a18;border:0.5px solid #252523;border-radius:10px;padding:1.25rem;}
  .card-title{font-size:12px;font-weight:500;color:#aaa;margin-bottom:14px;}

  /* distribucion */
  .dist-row{display:flex;gap:6px;height:8px;border-radius:4px;overflow:hidden;margin:8px 0 6px;}
  .dist-bar{height:100%;transition:width .5s;}
  .dist-labels{display:flex;justify-content:space-between;font-size:10px;color:#666;}
  .dist-item{display:flex;align-items:center;gap:4px;}
  .dot{width:7px;height:7px;border-radius:50%;}

  /* comments */
  .comments-card{background:#1a1a18;border:0.5px solid #252523;border-radius:10px;padding:1.25rem;margin-top:10px;}
  .comments-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .pills{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid #333;color:#888;cursor:pointer;background:transparent;transition:all .2s;}
  .pill:hover{border-color:#555;color:#ccc;}
  .pill.active{background:#FF6840;border-color:#FF6840;color:#fff;}
  .comment{padding:11px 0;border-bottom:0.5px solid #1e1e1c;}
  .comment:last-child{border-bottom:none;}
  .comment-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:6px;}
  .comment-name{font-size:12px;font-weight:500;color:#d4d1cc;}
  .comment-meta{display:flex;gap:6px;align-items:center;}
  .week-tag{font-size:10px;color:#666;background:#151513;padding:2px 8px;border-radius:20px;border:0.5px solid #2a2a28;}
  .score-tag{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;}
  .promotor{background:#063a2e;color:#5DCAA5;}
  .pasivo{background:#3d2400;color:#EF9F27;}
  .detractor{background:#3d1010;color:#F09595;}
  .comment-text{font-size:12px;color:#777;line-height:1.6;}
  .no-comments{font-size:13px;color:#555;padding:1.5rem 0;text-align:center;}

  /* nps gauge number */
  .nps-big{font-size:30px;font-weight:500;color:#FF6840;}

  @media(max-width:600px){
    .metrics{grid-template-columns:1fr 1fr;}
    .charts-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="dash">

  <div class="topbar">
    <div class="topbar-left">
      <h1>NPS Rappi — Riders</h1>
      <p id="subtitle">Cargando datos...</p>
    </div>
    <div class="topbar-right">
      <select id="filterSemana"><option value="">Todas las semanas</option></select>
      <select id="filterMes"><option value="">Todos los meses</option></select>
      <select id="filterTipo">
        <option value="">Todos</option>
        <option value="promotor">Promotores</option>
        <option value="pasivo">Pasivos</option>
        <option value="detractor">Detractores</option>
      </select>
      <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
    </div>
  </div>

  <div id="main-content">
    <div class="loading"><div class="spinner"></div> Cargando datos del Sheet...</div>
  </div>

</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrgdISk_kxhQHay_sq7UAI943wxLsmDoQX5APvJldTRMdA350jF3r-mrH5vXv6AwE1sYu_yXOHs-C_/pub?gid=1119032516&single=true&output=csv';

let allData = [];
let chartSemanal = null;
let chartMensual = null;

function csvToRows(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(l => {
    const vals = parseCSVLine(l);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  }).filter(r => r);
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

function getNPSType(score) {
  const s = parseFloat(score);
  if (isNaN(s)) return null;
  if (s >= 9) return 'promotor';
  if (s >= 7) return 'pasivo';
  return 'detractor';
}

function calcNPS(rows) {
  const valid = rows.map(r => parseFloat(r._scoreRappi)).filter(s => !isNaN(s));
  if (!valid.length) return null;
  const pct_p = valid.filter(s => s >= 9).length / valid.length * 100;
  const pct_d = valid.filter(s => s <= 6).length / valid.length * 100;
  return Math.round(pct_p - pct_d);
}

function unique(arr) {
  return [...new Set(arr)].filter(Boolean).sort();
}

async function loadData() {
  document.getElementById('main-content').innerHTML = '<div class="loading"><div class="spinner"></div> Cargando datos del Sheet...</div>';
  chartSemanal = null; chartMensual = null;

  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('No se pudo acceder al Sheet');
    const text = await res.text();
    const rows = csvToRows(text);

    // Detect columns — headers visible in screenshot
    // Col X = "¿Qué tan probable es que recomiendes Rappi a otro conductor?"
    // Col Y = "Porque recomendarías o no recomendarías a Rappi?"
    // Col Z = "SEMANA"
    // Col W = "MES"
    const sample = rows[0];
    const keys = Object.keys(sample);

    // Find by index: col X = index 23, Y = 24, Z = 25, W = 22 (0-based)
    // But let's detect by partial header match to be safe
    const colNPS = keys.find(k => k.toLowerCase().includes('rappi') && k.toLowerCase().includes('probable')) || keys[23];
    const colComment = keys.find(k => k.toLowerCase().includes('recomendaría') || k.toLowerCase().includes('recomendarias')) || keys[24];
    const colSemana = keys.find(k => k.toUpperCase() === 'SEMANA') || keys[25];
    const colMes = keys.find(k => k.toUpperCase() === 'MES') || keys[22];
    const colNombre = keys.find(k => k.toLowerCase().includes('nombre') || k.toLowerCase().includes('repartidor')) || keys[0];

    allData = rows.map(r => ({
      nombre: r[colNombre] || '',
      _scoreRappi: r[colNPS] || '',
      comentario: r[colComment] || '',
      semana: r[colSemana] || '',
      mes: r[colMes] || '',
      tipo: getNPSType(r[colNPS])
    })).filter(r => r._scoreRappi !== '' && r.semana !== '');

    // Populate filters
    const semanas = unique(allData.map(r => r.semana));
    const meses = unique(allData.map(r => r.mes));
    const selS = document.getElementById('filterSemana');
    const selM = document.getElementById('filterMes');
    selS.innerHTML = '<option value="">Todas las semanas</option>' + semanas.map(s => `<option value="${s}">${s}</option>`).join('');
    selM.innerHTML = '<option value="">Todos los meses</option>' + meses.map(m => `<option value="${m}">${m}</option>`).join('');

    const lastSemana = semanas[semanas.length - 1];
    document.getElementById('subtitle').textContent = `Encuesta semanal · ${allData.length} respuestas · última semana: ${lastSemana}`;

    renderDashboard();

    // Bind filters
    ['filterSemana','filterMes','filterTipo'].forEach(id => {
      document.getElementById(id).onchange = renderDashboard;
    });

  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="loading" style="color:#F09595;">Error: ${e.message}. Verifica que el Sheet sea público.</div>`;
  }
}

function getFiltered() {
  const semana = document.getElementById('filterSemana').value;
  const mes = document.getElementById('filterMes').value;
  const tipo = document.getElementById('filterTipo').value;
  return allData.filter(r =>
    (!semana || r.semana === semana) &&
    (!mes || r.mes === mes) &&
    (!tipo || r.tipo === tipo)
  );
}

function renderDashboard() {
  const filtered = getFiltered();
  const semanaFilter = document.getElementById('filterSemana').value;
  const mesFilter = document.getElementById('filterMes').value;

  // NPS global del filtro actual
  const npsActual = calcNPS(filtered);

  // NPS por semana (todos los datos, sin filtro de semana)
  const baseForSemana = mesFilter
    ? allData.filter(r => r.mes === mesFilter)
    : allData;
  const semanas = unique(baseForSemana.map(r => r.semana));
  const npsPorSemana = semanas.map(s => ({
    semana: s,
    nps: calcNPS(baseForSemana.filter(r => r.semana === s)),
    n: baseForSemana.filter(r => r.semana === s).length
  }));

  // NPS por mes
  const meses = unique(allData.map(r => r.mes));
  const npsPorMes = meses.map(m => ({
    mes: m,
    nps: calcNPS(allData.filter(r => r.mes === m)),
    n: allData.filter(r => r.mes === m).length
  }));

  // Última semana NPS vs anterior
  const lastIdx = npsPorSemana.length - 1;
  const npsUltima = lastIdx >= 0 ? npsPorSemana[lastIdx].nps : null;
  const npsAnterior = lastIdx >= 1 ? npsPorSemana[lastIdx - 1].nps : null;
  const deltaSemana = (npsUltima !== null && npsAnterior !== null) ? npsUltima - npsAnterior : null;

  // Ultimo mes vs anterior
  const lastMesIdx = npsPorMes.length - 1;
  const npsUltimoMes = lastMesIdx >= 0 ? npsPorMes[lastMesIdx].nps : null;
  const npsAnteriorMes = lastMesIdx >= 1 ? npsPorMes[lastMesIdx - 1].nps : null;
  const deltaMes = (npsUltimoMes !== null && npsAnteriorMes !== null) ? npsUltimoMes - npsAnteriorMes : null;

  // Distribución
  const total = filtered.length;
  const pP = total ? Math.round(filtered.filter(r => r.tipo === 'promotor').length / total * 100) : 0;
  const pN = total ? Math.round(filtered.filter(r => r.tipo === 'pasivo').length / total * 100) : 0;
  const pD = total ? Math.round(filtered.filter(r => r.tipo === 'detractor').length / total * 100) : 0;

  // Comentarios con texto
  const conComentario = filtered.filter(r => r.comentario && r.comentario.length > 2);

  const deltaHTML = (d, label) => {
    if (d === null) return `<span class="neutral">sin dato previo</span>`;
    if (d > 0) return `<span class="up">+${d} ${label}</span>`;
    if (d < 0) return `<span class="down">${d} ${label}</span>`;
    return `<span class="neutral">= ${label}</span>`;
  };

  document.getElementById('main-content').innerHTML = `
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">NPS última semana</div>
        <div class="metric-value nps-big">${npsUltima !== null ? npsUltima : '—'}</div>
        <div class="metric-delta">${deltaHTML(deltaSemana, 'vs semana anterior')}</div>
      </div>
      <div class="metric">
        <div class="metric-label">NPS promedio del mes</div>
        <div class="metric-value nps-big">${npsUltimoMes !== null ? npsUltimoMes : '—'}</div>
        <div class="metric-delta">${deltaHTML(deltaMes, 'vs mes anterior')}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Respuestas totales</div>
        <div class="metric-value">${total}</div>
        <div class="metric-delta">
          <span style="color:#5DCAA5;">${pP}% promotores</span> ·
          <span style="color:#EF9F27;">${pN}% pasivos</span> ·
          <span style="color:#F09595;">${pD}% detractores</span>
        </div>
      </div>
    </div>

    <div style="background:#1a1a18;border:0.5px solid #252523;border-radius:10px;padding:1.25rem;margin-bottom:10px;">
      <div class="card-title">Distribución de respuestas</div>
      <div class="dist-row">
        <div class="dist-bar" style="width:${pP}%;background:#5DCAA5;"></div>
        <div class="dist-bar" style="width:${pN}%;background:#EF9F27;"></div>
        <div class="dist-bar" style="width:${pD}%;background:#F09595;"></div>
      </div>
      <div class="dist-labels">
        <div class="dist-item"><span class="dot" style="background:#5DCAA5;"></span> Promotores ${pP}%</div>
        <div class="dist-item"><span class="dot" style="background:#EF9F27;"></span> Pasivos ${pN}%</div>
        <div class="dist-item"><span class="dot" style="background:#F09595;"></span> Detractores ${pD}%</div>
      </div>
    </div>

    <div class="charts-row">
      <div class="card">
        <div class="card-title">NPS por semana</div>
        <div style="position:relative;height:180px;">
          <canvas id="chartSemanal" role="img" aria-label="NPS de Rappi por semana"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">NPS promedio mensual</div>
        <div style="position:relative;height:180px;">
          <canvas id="chartMensual" role="img" aria-label="NPS mensual de Rappi"></canvas>
        </div>
      </div>
    </div>

    <div class="comments-card">
      <div class="comments-header">
        <div style="font-size:12px;font-weight:500;color:#aaa;">Comentarios de riders <span style="color:#555;font-weight:400;">(${conComentario.length})</span></div>
      </div>
      <div id="comentarios-list">
        ${conComentario.length === 0
          ? '<div class="no-comments">Sin comentarios para este filtro</div>'
          : conComentario.map(r => `
            <div class="comment">
              <div class="comment-top">
                <span class="comment-name">${r.nombre || 'Rider'}</span>
                <div class="comment-meta">
                  <span class="score-tag ${r.tipo}">${r.tipo === 'promotor' ? 'Promotor' : r.tipo === 'pasivo' ? 'Pasivo' : 'Detractor'} · ${r._scoreRappi}</span>
                  <span class="week-tag">${r.semana}</span>
                </div>
              </div>
              <div class="comment-text">${r.comentario}</div>
            </div>`).join('')}
      </div>
    </div>
  `;

  // Charts
  const gridColor = 'rgba(255,255,255,0.05)';
  const tickColor = '#555';
  const baseOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#1e1e1c', titleColor: '#ccc', bodyColor: '#888',
      borderColor: '#333', borderWidth: 0.5, padding: 10
    }},
    scales: {
      x: { grid: { display: false }, ticks: { color: tickColor, font: { size: 10 } } },
      y: { min: -100, max: 100, grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 10 }, stepSize: 50 },
           title: { display: false } }
    }
  };

  chartSemanal = new Chart(document.getElementById('chartSemanal'), {
    type: 'line',
    data: {
      labels: npsPorSemana.map(d => d.semana),
      datasets: [{
        data: npsPorSemana.map(d => d.nps),
        borderColor: '#FF6840',
        backgroundColor: 'rgba(255,104,64,0.07)',
        fill: true, tension: 0.35,
        pointRadius: 4, pointBackgroundColor: '#FF6840',
        borderWidth: 2
      }]
    },
    options: baseOpts
  });

  chartMensual = new Chart(document.getElementById('chartMensual'), {
    type: 'bar',
    data: {
      labels: npsPorMes.map(d => d.mes),
      datasets: [{
        data: npsPorMes.map(d => d.nps),
        backgroundColor: npsPorMes.map((d, i) => i === npsPorMes.length - 1 ? '#FF6840' : '#2a2a28'),
        borderRadius: 4, borderSkipped: false
      }]
    },
    options: { ...baseOpts }
  });
}

loadData();
</script>
</body>
</html>
